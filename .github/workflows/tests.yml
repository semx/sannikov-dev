name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy hub
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run CLI smoke test
        run: |
          python -m hub.cli init-db /tmp/hub.db
          python -m hub.cli add-transaction /tmp/hub.db --amount 1000 --currency AMD --kind income
          python -m hub.cli tax-estimate /tmp/hub.db
